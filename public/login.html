<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LUMINEX — Access</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05070D;
  --blue:#3B82F6;
  --cyan:#22D3EE;
  --text:#E2E8F0;
  --muted:#4A5568;
  --border:rgba(255,255,255,0.06);
  --border-blue:rgba(59,130,246,0.15);
}
html,body{
  height:100%;min-height:100vh;
  background:var(--bg);color:var(--text);
  font-family:'Outfit',sans-serif;font-weight:300;
  overflow:hidden;-webkit-font-smoothing:antialiased;
}
#universe{position:fixed;inset:0;z-index:0;pointer-events:none}
.page{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;
}
.card{
  width:100%;max-width:400px;
  background:rgba(8,14,26,0.9);
  backdrop-filter:blur(40px);
  border:1px solid var(--border-blue);
  border-radius:20px;padding:36px;
  box-shadow:0 0 60px -20px rgba(59,130,246,0.15),inset 0 1px 0 rgba(255,255,255,0.04);
  animation:cardIn .6s cubic-bezier(.23,1,.32,1) both;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,rgba(59,130,246,0.4),transparent);
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.logo-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,#0d1829,#1a2f4e);
  border:1px solid var(--border-blue);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 12px rgba(59,130,246,0.15);flex-shrink:0;
}
.logo-icon svg{animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.75}50%{opacity:1}}
.logo-name{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:4px;color:var(--text)}
.logo-ver{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(59,130,246,0.4);margin-top:3px}
.card-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--blue);text-transform:uppercase;margin-bottom:6px;display:block}
.card-desc{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.field{margin-bottom:14px}
.field-label{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.field input{
  width:100%;background:rgba(255,255,255,0.03);
  border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;font-family:'JetBrains Mono',monospace;
  font-size:13px;letter-spacing:1px;color:var(--text);
  outline:none;transition:all .25s;-webkit-appearance:none;
}
.field input:focus{border-color:rgba(59,130,246,0.35);background:rgba(59,130,246,0.04);box-shadow:0 0 18px -8px rgba(59,130,246,0.3)}
.field input::placeholder{color:#1E2A3A}
.field input.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.btn{
  width:100%;margin-top:8px;padding:14px;
  background:linear-gradient(135deg,var(--blue),#2563EB);
  color:#fff;font-family:'JetBrains Mono',monospace;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:500;
  border:none;border-radius:10px;cursor:pointer;
  position:relative;overflow:hidden;
  transition:all .3s cubic-bezier(.23,1,.32,1);
  box-shadow:0 4px 20px rgba(59,130,246,0.2);
}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(59,130,246,0.35)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn .lbl{transition:opacity .15s}
.btn.loading .lbl{opacity:0}
.btn-sp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.btn.loading .btn-sp{opacity:1}
.sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:#f87171;text-align:center;min-height:16px;opacity:0;transition:opacity .2s}
.err.show{opacity:1}
.footer{margin-top:20px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:#0F1A2A;text-transform:uppercase;text-align:center}
</style>
</head>
<body>
<canvas id="universe"></canvas>
<div class="page">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <line x1="3" y1="3" x2="17" y2="17" stroke="url(#lg1)" stroke-width="2" stroke-linecap="round"/>
          <line x1="17" y1="3" x2="3" y2="17" stroke="url(#lg2)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="10" cy="10" r="2.2" fill="white" opacity="0.9"/>
          <defs>
            <linearGradient id="lg1" x1="3" y1="3" x2="17" y2="17"><stop stop-color="#3B82F6"/><stop offset="1" stop-color="#22D3EE"/></linearGradient>
            <linearGradient id="lg2" x1="17" y1="3" x2="3" y2="17"><stop stop-color="#22D3EE"/><stop offset="1" stop-color="#3B82F6"/></linearGradient>
          </defs>
        </svg>
      </div>
      <div>
        <div class="logo-name">LUMINEX</div>
        <div class="logo-ver">Restricted Access</div>
      </div>
    </div>
    <span class="card-label">Authentication</span>
    <p class="card-desc">Введи данные для входа в систему.</p>
    <div class="field">
      <label class="field-label" for="uIn">Username</label>
      <input type="text" id="uIn" placeholder="login" autocomplete="username" autocapitalize="none" spellcheck="false" autofocus>
    </div>
    <div class="field">
      <label class="field-label" for="pIn">Password</label>
      <input type="password" id="pIn" placeholder="••••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btn">
      <span class="lbl">Get Access</span>
      <span class="btn-sp"><div class="sp"></div></span>
    </button>
    <div class="err" id="err"></div>
  </div>
  <div class="footer">Luminex · Closed System · 2026</div>
</div>
<script>
// Telegram WebApp init
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.setHeaderColor('#05070D');
  Telegram.WebApp.setBackgroundColor('#05070D');
}

// Particles bg
(function(){
  const cv=document.getElementById('universe'),cx=cv.getContext('2d');
  let W,H,pts=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
  addEventListener('resize',resize);resize();
  function Pt(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.18;this.vy=(Math.random()-.5)*.18;this.r=Math.random()*.8+.2;this.o=Math.random()*.2+.05}
  Pt.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W)this.vx*=-1;if(this.y<0||this.y>H)this.vy*=-1};
  for(let i=0;i<60;i++)pts.push(new Pt());
  (function loop(){
    cx.clearRect(0,0,W,H);
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<120){cx.strokeStyle=`rgba(59,130,246,${(1-d/120)*.08})`;cx.lineWidth=.5;cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.stroke()}}
    pts.forEach(p=>{p.update();cx.fillStyle=`rgba(59,130,246,${p.o})`;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill()});
    requestAnimationFrame(loop);
  })();
})();

const uIn=document.getElementById('uIn'),pIn=document.getElementById('pIn'),btn=document.getElementById('btn'),err=document.getElementById('err');
function showErr(m){err.textContent=m;err.classList.add('show');[uIn,pIn].forEach(el=>{el.classList.remove('shake');void el.offsetWidth;el.classList.add('shake')})}
function clrErr(){err.classList.remove('show')}
[uIn,pIn].forEach(el=>el.addEventListener('input',clrErr));
uIn.addEventListener('keydown',e=>e.key==='Enter'&&pIn.focus());
pIn.addEventListener('keydown',e=>e.key==='Enter'&&login());
btn.addEventListener('click',login);

async function login(){
  const u=uIn.value.trim(),p=pIn.value;
  if(!u){showErr('Введи логин');uIn.focus();return}
  if(!p){showErr('Введи пароль');pIn.focus();return}
  btn.classList.add('loading');btn.disabled=true;clrErr();
  try{
    const res=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const data=await res.json();
    if(data.ok){
      btn.classList.remove('loading');
      btn.innerHTML=`<span style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px">✓ ${(data.user?.name||u).toUpperCase()}</span>`;
      setTimeout(()=>{ window.location.href='/dashboard'; },600);
    }else{
      btn.classList.remove('loading');btn.disabled=false;
      showErr(data.error||'Неверный логин или пароль');
      pIn.value='';pIn.focus();
    }
  }catch(e){btn.classList.remove('loading');btn.disabled=false;showErr('Ошибка соединения')}
}
</script>
</body>
</html>
